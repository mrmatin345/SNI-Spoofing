name: Build & Release Windows EXE

# Builds a standalone Windows .exe with PyInstaller (bundling the WinDivert
# driver that ships inside pydivert) and publishes it to a GitHub Release.
#
# How to cut a release:
#   1. Merge your changes into main.
#   2. Tag a version and push it, e.g.:
#        git tag v1.0.0
#        git push origin v1.0.0
#   3. This workflow runs, builds the exe, and attaches it to a Release for v1.0.0.
#
# You can also trigger it manually from the Actions tab (Run workflow) to get a
# downloadable build artifact without publishing a Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # required so the release step can create the Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Sanity check (pure-logic tests)
        run: python tests/test_packet_templates.py

      - name: Build EXE
        # --onefile      : single self-contained executable
        # --uac-admin    : embed a manifest so Windows prompts for admin rights
        #                  (WinDivert needs administrator privileges)
        # --collect-all  : bundle pydivert's WinDivert*.dll / WinDivert*.sys driver
        run: >
          pyinstaller --onefile --uac-admin
          --name SNI-Spoofing
          --collect-all pydivert
          main.py

      - name: Stage release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          Copy-Item dist/SNI-Spoofing.exe bundle/
          Copy-Item config.json bundle/           # config.json must sit next to the exe
          Copy-Item README.md bundle/
          Compress-Archive -Path bundle/* -DestinationPath SNI-Spoofing-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SNI-Spoofing-windows
          path: SNI-Spoofing-windows.zip
          retention-days: 30

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SNI-Spoofing ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            SNI-Spoofing-windows.zip
            dist/SNI-Spoofing.exe
